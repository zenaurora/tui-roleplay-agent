# rust-agent 配置示例
#
# 使用方法：
#   1. 复制本文件为 config/story.toml
#   2. 按需修改各节配置
#   3. 运行程序：cargo run
#
# 格式为 TOML。带「可选」标记的字段可省略，程序会使用默认值。
# api_key 也可不写，改为设置环境变量 OPENAI_API_KEY。

# =============================================================================
# [llm] — 大语言模型 API 配置
# =============================================================================
[llm]
# 必填。OpenAI 兼容 API 的基础地址。
# 示例：
#   OpenAI:    https://api.openai.com/v1
#   DeepSeek:  https://api.deepseek.com
#   本地 Ollama: http://localhost:11434/v1
base_url = "https://api.openai.com/v1"

# 可选。API 密钥。留空或省略时，会读取环境变量 OPENAI_API_KEY。
# api_key = "sk-your-api-key-here"

# 必填。默认使用的模型名称。
model = "gpt-4o"

# 可选。单次回复的最大 token 数。默认：4096
max_tokens = 4096

# 可选。生成温度，0.0–2.0，越高越随机。默认：0.8
temperature = 0.8

# 可选。是否启用思考/推理模式（如 DeepSeek R1 等）。默认：false
thinking_enabled = false

# 可选。推理强度，仅在 thinking_enabled = true 时生效。
# 可选值："high" | "max"。默认："high"
reasoning_effort = "high"

# =============================================================================
# [tools] — 本地工具（Agent 可调用的沙箱能力）
# =============================================================================
[tools]
# 可选。是否向角色 Agent 暴露本地工具。默认：false
# 关闭时，角色配置中的 allowed_tools 不能非空，否则启动报错。
enabled = false

# 可选。全局工具白名单。enabled = true 时，只有列在此处的工具才可能被角色使用。
# 留空表示全局不允许任何工具（即使 enabled = true）。
# 可用工具名：
#   read_file   — 读取工作目录内文件
#   write_file  — 写入工作目录内文件
#   zsh         — 在沙箱中执行 shell 命令
allowed = ["read_file", "write_file", "zsh"]

# =============================================================================
# [story] — 剧情 / 角色扮演场景
# =============================================================================
[story]
# 必填。故事标题，显示在 TUI 顶部。
title = "示例故事：迷雾酒馆"

# 必填。故事简介，用于场景与角色上下文。
description = "你推开一扇吱呀作响的木门，走进一家藏在巷尾的古老酒馆。烛光摇曳，几位性格迥异的常客正在低声交谈。"

# 必填。玩家在故事中的角色名（导演与角色 Agent 会以此称呼玩家）。
protagonist_name = "旅人"

# 可选。回合策略，决定「谁下一个说话」。默认：DirectorControlled
# 可选值：
#   RoundRobin         — 角色按固定顺序轮流发言
#   DirectorControlled — 由导演 Agent 根据对话动态决定（推荐）
#   Random             — 在活跃角色中随机选择
turn_strategy = "DirectorControlled"

# 可选。外部角色定义文件路径列表（相对于 config/ 目录）。
# 注意：当前版本尚未从文件加载，仅支持下方 [[story.characters]] 内联定义。
# character_files = ["characters/innkeeper.toml", "characters/scholar.toml"]

# 可选。外部场景定义文件路径列表（相对于 config/ 目录）。
# 注意：当前版本尚未从文件加载，场景由本文件中的 description / scene_goals / scene_context 构成。
# scene_files = ["scenes/opening.toml"]

# 可选。场景目标列表，会注入导演与角色的提示词，引导剧情走向。
scene_goals = [
    "让玩家自然融入酒馆氛围，与至少两位角色建立对话",
    "根据玩家提问推动剧情，而不是角色单方面长篇独白",
    "适时把发言权交还给玩家",
]

# 可选。额外场景背景，补充 description 未覆盖的细节（时间、地点、氛围等）。
scene_context = "时间：雨夜。地点：港口城市后巷的地下酒馆。玩家浑身湿透，刚躲过一场追捕。"

# -----------------------------------------------------------------------------
# [story.director] — 导演 Agent（控制发言顺序与剧情节奏）
# -----------------------------------------------------------------------------
[story.director]
# 必填。导演的系统提示词。导演应输出 JSON 决定下一步行动，例如：
#   {"type":"sequential","speakers":["角色名"]}  — 角色依次发言
#   {"type":"parallel","speakers":["角色A","角色B"]} — 多角色同时发言
#   {"type":"player"}                             — 等待玩家输入
#   {"type":"end_scene"}                          — 结束场景
system_prompt = """
你是一个多角色扮演场景的叙事导演。根据最近对话，决定下一步谁说话。

只输出一个 JSON 对象，不要 markdown 代码块，不要额外说明：
- 让角色依次说话：{"type":"sequential","speakers":["角色名"]}
- 让多个角色同时说话：{"type":"parallel","speakers":["角色A","角色B"]}
- 让玩家说话：{"type":"player"}
- 结束场景：{"type":"end_scene"}

规则：
- 玩家刚发言后，通常应让 1–2 个相关角色回应，再交回玩家
- 不要连续让同一角色发言超过两次
- 除非玩家明确表示要结束，否则不要轻易 end_scene
"""

# 必填。送给导演参考的最近消息条数（越大上下文越多，token 消耗越高）。
recent_message_count = 20

# =============================================================================
# [[story.characters]] — 角色定义（可重复多个表项）
# =============================================================================

# --- 角色 1：完整示例（含所有可选字段）---
[[story.characters]]
# 必填。角色名称，需与导演 JSON 中的 speakers 一致。
name = "老板娘"

# 必填。性格简述，用于构建角色人格。
personality = "爽朗、精明、见多识广，说话带一点江湖气，对熟客热情、对陌生人保持警觉。"

# 必填。背景故事，丰富角色动机与记忆。
backstory = "在这家酒馆守了二十年，听过无数秘密。丈夫早年失踪，她独自撑下店面，与三教九流都打过交道。"

# 必填。角色 Agent 的系统提示词（比 personality/backstory 更细的行为约束写在这里）。
system_prompt = """
你是酒馆的老板娘。用中文回复，每次 2–4 句话。
- 保持爽朗但不过分话痨
- 只扮演老板娘，不要替玩家或其他角色说话
- 不要输出「老板娘:」这类名字前缀
"""

# 可选。TUI 侧栏显示的短描述。省略时取 personality 前 30 字。
short_description = "酒馆主人"

# 可选。该角色单独使用的模型；省略则使用 [llm].model。
# model = "gpt-4o-mini"

# 可选。该角色允许使用的工具子集，必须是 [tools].allowed 的子集。
# 仅当 [tools].enabled = true 时生效；留空表示该角色不使用工具。
allowed_tools = ["read_file"]

# --- 角色 2：最简示例（仅必填字段）---
[[story.characters]]
name = "老学者"
personality = "沉默寡言、博学，偶尔冒出晦涩典故，对古籍和星象着迷。"
backstory = "曾是大学教师，因一场丑闻隐姓埋名，常年坐在酒馆角落翻书。"
system_prompt = """
你是角落里的老学者。用中文回复，语气文雅克制，每次 1–3 句话。
只扮演自己，不要生成其他角色或玩家的台词。
"""

# --- 角色 3：展示 per-character 模型覆盖 ---
[[story.characters]]
name = "游吟诗人"
personality = "活泼、爱编顺口溜，总想套话打听各地奇闻。"
backstory = "背着鲁特琴四处流浪，声称在写一部大陆史诗。"
system_prompt = """
你是游吟诗人。用中文回复，可押韵或带一点戏剧腔，每次 2–3 句话。
只扮演自己，不要替他人发言。
"""
short_description = "流浪艺人"
model = "gpt-4o-mini"

# =============================================================================
# [runtime] — 运行行为配置
# =============================================================================
[runtime]
# 可选。NPC 最多连续发言轮数；达到后会强制把发言权交回玩家。默认：3
max_npc_turns = 3
